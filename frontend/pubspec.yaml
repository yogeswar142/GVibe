name: gvibe
description: "GVibe — A Social Connection Platform for Campus Students"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^13.0.0
  google_fonts: ^6.2.1
  dio: ^5.4.3
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env

flutter_native_splash:
  color: "#0A0A0F"
  image: "assets/splash_screen.png"
  fullscreen: true
  android_gravity: fill
  ios_content_mode: scaleAspectFill
  android_12:
    image: "assets/splash_screen.png"
    icon_background_color: "#0A0A0F"
    color: "#0A0A0F"
